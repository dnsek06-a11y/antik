name: antikeshop

x-backend-env: &backend-env
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_SECRET: ${JWT_SECRET}
  COOKIE_SECRET: ${COOKIE_SECRET}
  STORE_CORS: ${STORE_CORS}
  ADMIN_CORS: ${ADMIN_CORS}
  AUTH_CORS: ${AUTH_CORS}
  MEDUSA_BACKEND_URL: ${MEDUSA_BACKEND_URL}
  MEILISEARCH_HOST: ${MEILISEARCH_HOST}
  MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION}
  DISCOGS_TOKEN: ${DISCOGS_TOKEN}
  GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY}
  COMGATE_MERCHANT_ID: ${COMGATE_MERCHANT_ID}
  COMGATE_SECRET: ${COMGATE_SECRET}
  GOPAY_GOID: ${GOPAY_GOID}
  GOPAY_CLIENT_ID: ${GOPAY_CLIENT_ID}
  GOPAY_CLIENT_SECRET: ${GOPAY_CLIENT_SECRET}
  PACKETA_API_KEY: ${PACKETA_API_KEY}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=300"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:v1.10
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - ./data/meilisearch:/meili_data

  medusa-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/uploads:/app/uploads

  storefront:
    build:
      context: ./backend
      dockerfile: Dockerfile.storefront
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_MEDUSA_BACKEND_URL: ${NEXT_PUBLIC_MEDUSA_BACKEND_URL}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
      NEXT_PUBLIC_DEFAULT_REGION: ${NEXT_PUBLIC_DEFAULT_REGION}
      NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: ${NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY}
    depends_on:
      - medusa-backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN_STOREFRONT: ${DOMAIN_STOREFRONT}
      DOMAIN_BACKEND: ${DOMAIN_BACKEND}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    depends_on:
      - medusa-backend
      - storefront

  # --- Volitelné služby (spustit přes: docker compose --profile extra up -d) ---

  minio:
    image: minio/minio:latest
    profiles: ["extra"]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio:/data

  uptime-kuma:
    image: louislam/uptime-kuma:1
    profiles: ["extra"]
    restart: unless-stopped
    volumes:
      - ./data/uptime-kuma:/app/data
    ports:
      - "3001:3001"

  umami-db:
    image: postgres:16-alpine
    profiles: ["extra"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: umami
    volumes:
      - ./data/umami-db:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    profiles: ["extra"]
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://umami:${POSTGRES_PASSWORD}@umami-db:5432/umami
      APP_SECRET: ${JWT_SECRET}
    depends_on:
      - umami-db
